<main class="main-shell">
  <section class="chat-shell">
    <div id="dialogue-empty" class="chat-empty"></div>

    <div id="dialogue-detail" class="hidden chat-detail">
      <div id="chat-content" class="chat-content">
        <div id="dialogue-transcript" class="transcript"></div>
      </div>
    </div>
  </section>

  <footer id="turn-stage" class="composer-shell hidden">
    <div class="composer-card">
      <div class="composer-main">
        <textarea id="dialogue-message" rows="1" placeholder="写一句你想让他们听见的话"></textarea>
        <button id="prepare-turn-button" type="button" class="send-button" aria-label="送出">送出</button>
      </div>
    </div>
  </footer>
</main>
